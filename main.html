  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anton&display=swap');
    body {
      font-family: 'Open Sans', sans-serif;
      background: url('https://raw.githubusercontent.com/Rubim1/images/e3829a959b80903b5603555aacb52008783e2fa0/Nature-Wallpaper-HD-Free-download.jpg') no-repeat center center fixed;

    }
    .title {
      font-family: 'Anton', sans-serif;
    }
    .text-custom {
      color: #e4ecdd; /* Custom color */
    }
    #dynamic-text {
      font-family: 'Anton', sans-serif;
      font-weight: bold;
      color: #000; /* Changed color to black for better visibility */
      transition: color 0.5s ease, opacity 0.5s ease;
    }
    .btn {
      background-color: #e4ecdd;
      color: #000;
      padding: 10px 20px;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: background-color 0.3s ease, transform 0.3s ease;
    }
    .btn:hover {
      background-color: #c8d4c3;
      transform: translateY(-3px);
    }
    .fade-in {
      opacity: 0;
      animation: fadeIn 1.5s ease-in-out forwards;
    }
    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }
    .slide-up {
      transform: translateY(20px);
      opacity: 0;
      animation: slideUp 1.5s ease-in-out forwards;
    }
    @keyframes slideUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
    .bounce-in {
      animation: bounceIn 1.5s ease-in-out forwards;
    }
    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(0.3);
      }
      50% {
        opacity: 1;
        transform: scale(1.05);
      }
      70% {
        transform: scale(0.9);
      }
      100% {
        transform: scale(1);
      }
    }
    .text-outline {
      position: relative;
      display: inline-block;
      color: #fff;
      font-weight: 900;
      font-size: 5rem;
      font-family: 'Anton', sans-serif;
    }
    .text-outline::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
      color: black;
      -webkit-text-stroke: 2px black;
    }
    .text-outline.text-custom {
      color: #e4ecdd;
    }
  </style>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const dynamicText = document.getElementById("dynamic-text");
      dynamicText.innerText = "Loading";
      setTimeout(function() {
        dynamicText.style.opacity = 0;
        setTimeout(function() {
          dynamicText.innerText = "We Are";
          dynamicText.style.opacity = 1;
          setInterval(function() {
            dynamicText.style.opacity = 0;
            setTimeout(function() {
              if (dynamicText.innerText === "We Are") {
                dynamicText.innerText = "The Amazing Class";
              } else {
                dynamicText.innerText = "We Are";
              }
              dynamicText.style.opacity = 1;
            }, 500);
          }, 3000);
        }, 500);
      }, 3000);
    });
  </script>
